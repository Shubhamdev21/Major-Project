version: '3.8'
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: iot_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-iot_monitoring}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - iot_net

  redis:
    image: redis:7-alpine
    container_name: iot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - iot_net

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - iot_net

  node-red:
    image: nodered/node-red:latest
    container_name: iot_nodered
    ports:
      - "1880:1880"
    volumes:
      - ./node-red/data:/data
    restart: unless-stopped
    depends_on:
      - mosquitto
    networks:
      - iot_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - timescaledb
      - redis
      - mosquitto
    restart: unless-stopped
    networks:
      - iot_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - iot_net

  simulator:
    build:
      context: ./simulators
      dockerfile: Dockerfile
    container_name: iot_simulator
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - iot_net

volumes:
  timescaledb-data:
  redis-data:

networks:
  iot_net:
    driver: bridge
